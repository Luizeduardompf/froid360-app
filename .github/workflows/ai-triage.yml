# =============================================================================
# ai-triage.yml — Detecta issues novas e roteia para automação
# Trigger: issue aberta → adiciona label 'ai-processing' se elegível
# =============================================================================
name: AI Triage

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    # Não processar issues abertas por bots ou pelo próprio workflow
    if: |
      !contains(github.event.issue.labels.*.name, 'ai-processing') &&
      !contains(github.event.issue.labels.*.name, 'ai-done') &&
      github.event.issue.user.login != 'github-actions[bot]'

    steps:
      - name: Validate issue has content
        id: validate
        run: |
          BODY="${{ github.event.issue.body }}"
          TITLE="${{ github.event.issue.title }}"
          if [[ -z "$TITLE" ]]; then
            echo "eligible=false" >> "$GITHUB_OUTPUT"
          else
            echo "eligible=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Label as ai-processing
        if: steps.validate.outputs.eligible == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['ai-processing']
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '🤖 **Agente AI recebeu esta issue.**',
                '',
                'Processando implementação automaticamente. Acompanhe o progresso em [Actions](' +
                  `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions` +
                ').',
                '',
                '> Caso precise interromper, adicione a label `ai-blocked`.'
              ].join('\n')
            });

      - name: Skip — issue inelegível
        if: steps.validate.outputs.eligible == 'false'
        run: echo "Issue sem título — pulando automação."
